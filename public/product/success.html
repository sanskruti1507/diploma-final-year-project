<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Successful – Sakhi Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --primary:#1b5e20;
  --primary-light:#2e7d32;
  --bg:#e8f5e9;
  --card:#ffffff;
  --border:#c8e6c9;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body{
  background: linear-gradient(135deg,#e8f5e9,#f1f8e9);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:var(--card);
  width:100%;
  max-width:450px;
  padding:40px 30px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  border:1px solid var(--border);
}

.success-circle{
  width:90px;
  height:90px;
  margin:0 auto 20px;
  background:var(--bg);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
  color:var(--primary-light);
}

h1{
  color:var(--primary);
  margin-bottom:10px;
}

p{
  color:#555;
  font-size:14px;
  margin-bottom:20px;
}

.btn{
  width:100%;
  padding:12px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
  font-size:14px;
  border:none;
}

.btn-primary{
  background:var(--primary-light);
  color:white;
  margin-bottom:12px;
}

.btn-secondary{
  background:white;
  border:1px solid var(--border);
  color:var(--primary);
}

#order-summary{
  text-align:left;
  margin-bottom:20px;
}

#order-summary img{
  border:1px solid var(--border);
}
</style>
</head>

<body>

<div class="card">
  
  <div class="success-circle">✓</div>

  <h1>Order Placed Successfully!</h1>

  <p>
    Thank you for shopping with <b>Sakhi Enterprises</b>.<br>
    Your order has been placed successfully.
  </p>

  <div id="order-summary"></div>

  <button class="btn btn-primary" onclick="goToOrders()">
    View My Orders
  </button>

  <button class="btn btn-secondary" onclick="goToProducts()">
    Continue Shopping
  </button>

</div>

<script>

function goToOrders(){
  window.location.href = "myorders.html"; 
}

function goToProducts(){
  window.location.href = "product.html"; 
}

// ================= LOAD ORDER =================

const order = JSON.parse(sessionStorage.getItem("lastOrder"));

if (order && order.items && order.items.length > 0) {

  // ✅ FIX: Ensure Order ID exists
  if (!order.orderId) {
    order.orderId = "ORD" + Date.now();
  }

  let html = `
    <h3>Order Details</h3>
    <p><strong>Order ID:</strong> ${order.orderId}</p>
    <p><strong>Date:</strong> ${order.date || new Date().toLocaleString()}</p>
    <hr>
  `;

  order.items.forEach(item => {
    html += `
      <div style="display:flex; gap:10px; margin-bottom:15px; align-items:center;">
        
        <img src="${item.image || 'https://via.placeholder.com/60'}"
             style="width:60px; height:60px; border-radius:6px;" />

        <div style="flex:1;">
          <strong>${item.name}</strong><br>
          Qty: ${item.quantity}
        </div>

        <div>
          ₹${item.price * item.quantity}
        </div>

      </div>
    `;
  });

  html += `
    <hr>
    <h3>Total: ₹${order.total}</h3>
    <p><strong>Payment:</strong> ${order.payment}</p>
  `;

  document.getElementById("order-summary").innerHTML = html;

  // ✅ CLEAR AFTER SHOWING
  sessionStorage.removeItem("lastOrder");

} else {
  document.getElementById("order-summary").innerHTML =
    "<p>No order data found.</p>";
}

</script>
</body>
</html>
